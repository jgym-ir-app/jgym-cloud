<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0c0d0f" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="#0c0d0f" />
  <circle cx="256" cy="256" r="200" fill="url(#glow)" />
  
  <!-- Outer Gold Border with technical dashes (positioned slightly more inside for maskability) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" stroke-dasharray="10 15 40 15 120 15" />
  
  <!-- Dumbbell Center Accent (scaled down to fit safety area) -->
  <g transform="translate(256, 256) scale(1.05)" stroke="url(#gold)" stroke-width="6" fill="none" stroke-linecap="round">
    <!-- Dumbbell Bar -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke-width="12" />
    <!-- Left weights -->
    <rect x="-65" y="-30" width="15" height="60" rx="6" fill="url(#gold)" stroke="none" />
    <rect x="-80" y="-20" width="15" height="40" rx="4" fill="url(#gold)" stroke="none" />
    <!-- Right weights -->
    <rect x="50" y="-30" width="15" height="60" rx="6" fill="url(#gold)" stroke="none" />
    <rect x="65" y="-20" width="15" height="40" rx="4" fill="url(#gold)" stroke="none" />
  </g>

  <!-- Stylized J Character (scaled down to fit safety area) -->
  <g transform="translate(256, 220) scale(0.95)">
    <!-- J Path -->
    <path d="M 40 -80 L 40 40 C 40 80, -40 80, -40 40 C -40 20, -25 10, -10 10 C 2 10, 10 20, 10 40 C 10 50, 20 50, 20 40 L 20 -80 Z" 
          fill="url(#gold)" />
    <!-- Accent Dot -->
    <circle cx="40" cy="-110" r="14" fill="url(#gold)" />
  </g>
</svg>
